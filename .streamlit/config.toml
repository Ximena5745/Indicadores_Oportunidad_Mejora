# ════════════════════════════════════════════════════════════════════════════════
# CONFIGURACIÓN PERMANENTE STREAMLIT — NO MODIFICAR
# Última actualización: 15-04-2026
# Purpose: Eliminar espaciado lateral excesivo + mantener layout wide
# ════════════════════════════════════════════════════════════════════════════════

[client]
# Layout ancho - Elimina márgenes laterales
toolbarMode = "minimal"
showErrorDetails = false

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
# Máximos KB para upload
maxUploadSize = 50
# Máximo items en dataframe
maxMessageSize = 200

[theme]
base = "light"
primaryColor = "#1A3A5C"
backgroundColor = "#F4F6F9"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#212121"
font = "sans serif"

[browser]
serverAddress = "localhost"
gatherUsageStats = false

[runner]
magicEnabled = true

[logger]
level = "info"
