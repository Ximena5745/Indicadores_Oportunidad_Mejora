<style>
  :root{ --bg:#F8FAFC; --card:#FFFFFF; --primary:#0F385A; --fucsia:#EC0677; --muted:#6B7280; }
  body{font-family:Inter,Roboto,Arial,Helvetica,sans-serif;background:transparent}
  .kpi-row{display:flex;gap:12px;flex-wrap:wrap}
  .kpi-card{background:var(--card);border-radius:8px;padding:12px;min-width:160px;box-shadow:0 1px 2px rgba(2,6,23,0.06);transition:transform .12s ease,box-shadow .12s ease}
  .kpi-card:hover{transform:translateY(-4px);box-shadow:0 6px 20px rgba(15,56,90,0.08)}
  .kpi-title{font-size:12px;color:var(--muted)}
  .kpi-value{font-size:20px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:8px}
  .trend-up{color:#16A34A;font-size:12px}
  .trend-down{color:#DC2626;font-size:12px}
</style>

<div class="kpi-row" id="kpiContainer"></div>

<script>
  (function(){
    const data = __DATA__ || {};
    const kpis = data.kpi_list || [];
    const container = document.getElementById('kpiContainer');
    if(!container) return;
    container.innerHTML = '';
    kpis.forEach(k => {
      const card = document.createElement('div'); card.className = 'kpi-card';
      const title = document.createElement('div'); title.className = 'kpi-title'; title.innerText = k.title || '';
      const value = document.createElement('div'); value.className = 'kpi-value';
      const vspan = document.createElement('span'); vspan.innerText = k.value ?? '';
      value.appendChild(vspan);
      if(k.delta){ const d = document.createElement('span'); d.innerText = k.delta; d.className = (String(k.delta).startsWith('+')? 'trend-up':'trend-down'); value.appendChild(d) }
      card.appendChild(title); card.appendChild(value); container.appendChild(card);
    })
  })();
</script>
